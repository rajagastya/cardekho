spring.application.name=ai-buyer-backend
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:cardekho;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

gemini.api.key=${GEMINI_API_KEY:}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
